<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empire — Kráľovstvo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ============ AUTH SCREEN ============ -->
<section id="auth-screen" class="screen">
  <div class="auth-box">
    <h1 class="game-title">EMPIRE</h1>
    <p class="game-subtitle">Postav hrad. Vybuduj ríšu. Dobyj svet.</p>

    <form id="login-form" class="auth-form">
      <input type="email" id="login-email" placeholder="E-mail" required>
      <input type="password" id="login-password" placeholder="Heslo" required>
      <button type="submit" class="primary-btn">Prihlásiť sa</button>
      <p class="switch-link">Nemáš účet? <a href="#" id="show-register">Zaregistruj sa</a></p>
    </form>

    <form id="register-form" class="auth-form hidden">
      <input type="text" id="register-username" placeholder="Meno panovníka" required>
      <input type="email" id="register-email" placeholder="E-mail" required>
      <input type="password" id="register-password" placeholder="Heslo" required minlength="6">
      <button type="submit" class="primary-btn">Založiť kráľovstvo</button>
      <p class="switch-link">Už máš účet? <a href="#" id="show-login">Prihlás sa</a></p>
    </form>

    <p id="auth-error" class="auth-error"></p>
  </div>
</section>

<!-- ============ GAME SCREEN ============ -->
<section id="game-screen" class="screen hidden">
  <header class="top-bar">
    <div class="castle-title">
      <span class="crest">🏰</span>
      <span id="castle-name">Hrad</span>
    </div>
    <div id="resource-bar" class="resource-bar"></div>
    <button id="logout-btn" class="ghost-btn">Odhlásiť</button>
  </header>

  <main class="game-main">
    <div id="castle-grid" class="castle-grid"></div>
    <aside id="queue-panel" class="queue-panel"></aside>
  </main>
</section>

<!-- ============ MODAL ============ -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <button id="modal-close" class="modal-close">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
